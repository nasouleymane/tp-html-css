<!DOCTYPE html>
<html lang="fr">

  <head>

    <meta charset="utf-8">
    <title>Formulaire</title>
    <link rel="stylesheet" href="../assets/css/style.css">

  </head>

  <body>

    <header>
        <div class="container">
            <a href="index.html"><h1>Mon Site Web</h1></a>

            <nav>
                <ul>
                    <li><a href="../index.html">Accueil</a></li>
                    <li><a href="formulaire.html">Formulaire</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section>
                <h2>Formulaire d'inscription</h2>
                <form action="confirmation.html" method="post">

                    <!-- Nom -->
                    <div class="form-group">
                        <label for="nom">Nom :</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>
                    
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email :</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <!-- Âge -->
                    <div class="form-group">
                        <label for="age">Âge :</label>
                        <input type="number" id="age" name="age" required>
                    </div>

                    <!-- Liste déroulante -->
                    <div class="form-group">
                        <label for="pays">Pays :</label>
                        <select id="pays" name="pays">
                            <option value="">-- Choisissez un pays --</option>
                            <option value="algerie">Algérie</option>
                            <option value="allemagne">Allemagne</option>
                            <option value="belgique">Belgique</option>
                            <option value="canada">Canada</option>
                            <option value="espagne">Espagne</option>
                            <option value="etats-unis">États-Unis</option>
                            <option value="france">France</option>
                            <option value="italie">Italie</option>
                            <option value="maroc">Maroc</option>
                            <option value="pays-bas">Pays-Bas</option>
                            <option value="portugal">Portugal</option>
                            <option value="senegal">Sénégal</option>
                            <option value="suisse">Suisse</option>
                            <option value="togo">Togo</option>
                            <option value="autre">Autre</option>
                        
                        </select>
                    </div>

                    <!-- Radio -->
                    <div class="form-group">
                        <p>Genre :</p>
                        <label><input type="radio" name="genre" value="homme"> Homme</label>
                        <label><input type="radio" name="genre" value="femme"> Femme</label>
                    </div>

                    <!-- Checkbox -->
                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="conditions" value="oui" required>
                            J'accepte les conditions d'utilisation
                        </label>
                    </div>

                    <!-- Textarea -->
                    <div class="form-group">
                        <label for="message">Message :</label>
                        <textarea id="message" name="message" rows="5"></textarea>
                    </div>

                    <!-- Bouton submit -->
                    <div class="form-group">
                        <button type="submit" class="btn">Envoyer</button>
                    </div>

                </form>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 - MINI PROJET HTML/CSS</p>
        </div>
    </footer>

  </body>
</html>
